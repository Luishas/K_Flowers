<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fantasy Garden 🌹</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        canvas {
            display: block;
            margin: auto;
        }
        #message{
            position: fixed;
            bottom: 80px;
            width: 100%;
            font-size: clamp(14px, 2vw, 22px);
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
            pointer-events: none;
            max-width: 80%;
        }
    </style>
</head>
<body>
<div id="textBox">
    <div id="message"></div>
</div>
<h1>🌹 A Fantasy Garden for you Principessa, Je t'aime 🌹</h1>
<button id="startBtn">🌸 Iniciar</button>
<button id="resetBtn">🔄 Reiniciar</button>
<canvas id="canvas" width="800" height="600"></canvas>
<p id="message"></p>
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<script src="script.js"></script>

</body>
<img src="" class="corner-img">
</html>
