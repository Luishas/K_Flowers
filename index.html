<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jardín para ti 🌹</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        canvas {
            display: block;
            margin: auto;
        }
        #message{
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: clamp(14px, 2vw, 22px);
            font-weight: bold;
        }
    </style>
</head>
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>
<body>

<h1>🌹 Jardín para ti</h1>
<canvas id="canvas" width="800" height="600"></canvas>
<p id="message"></p>

<script src="script.js"></script>

</body>
</html>
